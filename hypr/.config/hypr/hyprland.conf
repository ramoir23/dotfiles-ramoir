############################
# MONITOR
############################

monitor=,1920x1080@60,auto,1

############################
# VARIÁVEIS
############################

$mod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun

############################
# INPUT (Teclado PT-BR)
############################

input {
    kb_layout = br
    kb_variant =
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        clickfinger_behavior = true
    }
    sensitivity = 0.3
}

# gestos
gestures {
    gesture = 3, horizontal, workspace
}

############################
# APARÊNCIA (Minimalista)
############################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = rgba(D78F77ff)
    col.inactive_border = rgba(333333aa)

    layout = dwindle
}

decoration {
    rounding = 5

    blur {
        enabled = false
    }

    #drop_shadow = false
}

animations {
    enabled = true

    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 3, smooth, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 3, smooth, slidehor
}

############################
# LAYOUT
############################

dwindle {
    pseudotile = true
    preserve_split = true
}

############################
# BINDINGS
############################

# Encerrar sessão
bind = SUPER SHIFT, E, exit

# Abrir terminal
bind = $mod, T, exec, $terminal

# Gerenciador de arquivos
bind = SUPER, E, exec, thunar

# Rofi (menu)
bind = $mod, D, exec, $menu

# Fechar janela
bind = $mod, Q, killactive

# Abrir navegador
bind = $mod, I, exec, firefox

# Alternar foco
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Alterar layout
bind = $mod, SPACE, togglesplit
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen
bind = $mod CTRL, Left, resizeactive, -40 0
bind = $mod CTRL, Right, resizeactive, 40 0
bind = $mod CTRL, Up, resizeactive, 0 -40
bind = $mod CTRL, Down, resizeactive, 0 40
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Right, movewindow, r
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Down, movewindow, d

# Alternar workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Mover janela para workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Screenshot
bind = , Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen

# Bloquear tela manualmente
bind = $mod, L, exec, hyprlock

# Trocar wallpaper aleatório + pywal  <-- NOVO
bind = $mod, W, exec, bash ~/.config/hypr/random-wall.sh

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 10%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brilho
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Tampa do notebook
bindl = , switch:on:Lid Switch, exec, hyprlock

############################
# INICIALIZAÇÃO
############################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hypridle
exec-once = swaync
exec-once = tlp start

exec-once = swww-daemon
exec-once = bash ~/.config/hypr/restore-wall.sh
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
